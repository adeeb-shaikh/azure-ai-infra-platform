name: Docker Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    env:
      ACR_NAME: acraiinfraadeebdev
      IMAGE_NAME: azure-ai-infra-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            ./app

      - name: Push Docker image with commit SHA tag
        run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Push Docker image with latest tag
        run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
